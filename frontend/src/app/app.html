<main class="min-h-screen bg-slate-950 font-sans selection:bg-indigo-500/30">
  <nav class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <div
            class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-600/20"
          >
            <span class="text-white font-bold text-xl">V</span>
          </div>
          <span class="text-white font-bold tracking-tight text-lg hidden sm:block"
            >Task Vault</span
          >
        </div>

        @if (authService.isLoggedIn()) {
          <div class="flex items-center gap-6">
            <div
              class="hidden md:flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10"
            >
              <span class="relative flex h-2 w-2">
                <span
                  class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"
                ></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
              </span>
              <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">
                {{ authService.userRole() }}
              </span>
            </div>

            <button
              (click)="authService.logout()"
              class="flex items-center gap-2 text-sm font-semibold text-slate-400 hover:text-red-400 transition-colors group"
            >
              <span>Logout</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 group-hover:translate-x-1 transition-transform"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                />
              </svg>
            </button>
          </div>
        } @else {
          <span class="text-xs text-slate-500 font-medium italic">Secure Environment</span>
        }
      </div>
    </div>
  </nav>

  <div class="relative">
    <div
      class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-4xl h-64 bg-indigo-600/5 blur-[120px] -z-10"
    ></div>

    <div class="max-w-7xl mx-auto py-6">
      <router-outlet></router-outlet>
    </div>
  </div>
</main>
