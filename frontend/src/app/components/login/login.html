<div
  class="min-h-screen bg-slate-950 flex items-center justify-center p-6 relative overflow-hidden"
>
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-600/20 rounded-full blur-3xl"></div>

  <div
    class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl shadow-2xl p-8 z-10"
  >
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">Task Vault</h1>
      <p class="text-slate-400 text-sm">Secure access to your enterprise dashboard</p>
    </div>

    @if (errorMessage()) {
      <div
        class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/50 text-red-400 text-xs text-center"
      >
        {{ errorMessage() }}
      </div>
    }

    <div class="space-y-5">
      <div>
        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2"
          >Username</label
        >
        <input
          [(ngModel)]="username"
          type="text"
          placeholder="Enter your username"
          class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all"
        />
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2"
          >Password</label
        >
        <input
          [(ngModel)]="password"
          type="password"
          placeholder="••••••••"
          class="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all"
        />
      </div>

      <button
        (click)="handleLogin()"
        [disabled]="isSubmitting()"
        class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-indigo-600/20 active:scale-[0.98]"
      >
        {{ isSubmitting() ? 'Authenticating...' : 'Sign In' }}
      </button>
    </div>

    <div class="mt-8 pt-6 border-t border-white/5 text-center">
      <p class="text-slate-400 text-sm">
        New to the platform?
        <a
          routerLink="/register"
          class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors ml-1"
        >
          Create an Account
        </a>
      </p>
    </div>
  </div>
</div>
